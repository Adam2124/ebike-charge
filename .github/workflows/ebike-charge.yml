name: E-Bike Charger

on:
  workflow_dispatch:
    inputs:
      hours:
        description: "Hours to charge"
        required: true
        default: "2"
      heat_breaks:
        description: "Use heat cooldown breaks?"
        type: boolean
        default: true
      charge_block_minutes:
        description: "Minutes charging before each cooldown"
        required: true
        default: "15"
      cooldown_minutes:
        description: "Minutes to cool down between charge blocks"
        required: true
        default: "2"

jobs:
  charge:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - name: Run charge cycle
        env:
          WYZE_EMAIL: ${{ secrets.WYZE_EMAIL }}
          WYZE_PASSWORD: ${{ secrets.WYZE_PASSWORD }}
          WYZE_API_KEY: ${{ secrets.WYZE_API_KEY }}
          WYZE_KEY_ID: ${{ secrets.WYZE_KEY_ID }}
          HOURS: ${{ inputs.hours }}
          HEAT_BREAKS: ${{ inputs.heat_breaks }}
          CHARGE_BLOCK_MINUTES: ${{ inputs.charge_block_minutes }}
          COOLDOWN_MINUTES: ${{ inputs.cooldown_minutes }}
          PYTHONHTTPSVERIFY: "0"
          CURL_CA_BUNDLE: ""
          REQUESTS_CA_BUNDLE: ""
        run: python charge.py
